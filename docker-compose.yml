version: '3.8'

services:
  nginx-meet:
    image: nginx:alpine
    container_name: nginx-meet
    ports:
      - "8092:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - nginx-cache-meet:/var/cache/nginx/fastcgi
    depends_on:
      - php-fpm-meet
    networks:
      - meet-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  php-fpm-meet:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    container_name: php-fpm-meet
    volumes:
      - ./:/var/www/html
      - nginx-cache-meet:/var/cache/nginx-cache
    depends_on:
      - mysql-meet
      - redis-meet
    networks:
      - meet-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  queue-worker-meet:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    container_name: queue-worker-meet
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql-meet
      - redis-meet
      - php-fpm-meet
    networks:
      - meet-network
    restart: unless-stopped
    command: php /var/www/html/artisan queue:work --sleep=3 --tries=3 --max-time=3600
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mysql-meet:
    image: mysql:8.0
    container_name: mysql-meet
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meet
      MYSQL_USER: meet
      MYSQL_PASSWORD: meet_password
    volumes:
      - mysql-meet-data:/var/lib/mysql
    networks:
      - meet-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  minio-meet:
    image: minio/minio:latest
    container_name: minio-meet
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-meet-data:/data
    networks:
      - meet-network
    restart: unless-stopped
    command: server /data --console-address ":9001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis-meet:
    image: redis:7-alpine
    container_name: redis-meet
    volumes:
      - redis-meet-data:/data
    networks:
      - meet-network
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  meilisearch-meet:
    image: getmeili/meilisearch:v1.5
    container_name: meilisearch-meet
    environment:
      MEILI_MASTER_KEY: meet_master_key_change_it
      MEILI_ENV: production
    volumes:
      - meilisearch-meet-data:/meili_data
    networks:
      - meet-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  meet-network:
    driver: bridge

volumes:
  mysql-meet-data:
  minio-meet-data:
  redis-meet-data:
  meilisearch-meet-data:
  nginx-cache-meet:
