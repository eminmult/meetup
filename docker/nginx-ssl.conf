# FastCGI Cache Path
fastcgi_cache_path /var/cache/nginx/fastcgi levels=1:2 keys_zone=FASTCGICACHE:100m inactive=60m max_size=1g;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

server_tokens off;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Map to detect HTTPS from proxy
map $http_x_forwarded_proto $fastcgi_https {
    default off;
    https on;
}

server {
    listen 80;
    listen [::]:80;
    server_name group.gasimov.az _;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    limit_req zone=general burst=50 nodelay;
    limit_conn conn_limit 20;

    root /var/www/html/public;
    index index.php;
    charset utf-8;
    client_max_body_size 50M;

    set $skip_cache 0;
    if ($request_method = POST) { set $skip_cache 1; }
    if ($request_uri ~* "/admin|/api") { set $skip_cache 1; }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass php-fpm-new1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTPS $fastcgi_https;

        fastcgi_cache FASTCGICACHE;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache_valid 200 5m;
        fastcgi_ignore_headers Cache-Control Set-Cookie;
        fastcgi_cache_use_stale error timeout updating invalid_header http_500;
        fastcgi_cache_background_update on;
        fastcgi_cache_lock on;

        add_header X-FastCGI-Cache $upstream_cache_status always;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
